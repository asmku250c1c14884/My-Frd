<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Love! ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a0033, #000);
            color: white;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        .container {
            padding: 3rem;
            z-index: 10;
            animation: bounceIn 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 800px;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.3) translateY(100px);
                opacity: 0;
            }

            50% {
                transform: scale(1.05) translateY(-20px);
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 2rem;
            line-height: 1.2;
            letter-spacing: -1px;
        }

        .premium-text {
            background: linear-gradient(135deg, #fff 0%, #ff9a9e 50%, #fecfef 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .emoji-showcase {
            font-size: 7rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 3rem;
        }

        .emoji-item {
            display: inline-block;
            filter: drop-shadow(0 0 20px rgba(255, 51, 102, 0.4));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), left 0.5s ease, top 0.5s ease;
            cursor: pointer;
            position: relative;
        }

        .emoji-item:nth-child(1) {
            animation: emojiBounce 2s infinite ease-in-out;
        }

        .emoji-item:nth-child(2) {
            animation: emojiPulse 1.5s infinite ease-in-out;
        }

        .emoji-item:nth-child(3) {
            animation: emojiSpin 3s infinite ease-in-out;
        }

        @keyframes emojiBounce {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.1);
            }
        }

        @keyframes emojiPulse {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px rgba(255, 51, 102, 0.4));
            }

            50% {
                transform: scale(1.2);
                filter: drop-shadow(0 0 40px rgba(255, 51, 102, 0.8));
            }
        }

        @keyframes emojiSpin {

            0%,
            100% {
                transform: rotate(0deg) scale(1);
            }

            50% {
                transform: rotate(15deg) scale(1.1);
            }
        }

        .sub-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 1.5rem;
            font-weight: 300;
        }

        /* Floating Light Blobs */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 0, 204, 0.15);
            filter: blur(80px);
            border-radius: 50%;
            z-index: 0;
            animation: moveBlobs 20s infinite alternate;
        }

        @keyframes moveBlobs {
            from {
                transform: translate(-50%, -50%);
            }

            to {
                transform: translate(50%, 50%);
            }
        }
    </style>
</head>

<body>
    <div class="blob" style="top: 20%; left: 20%;"></div>
    <div class="blob" style="bottom: 20%; right: 20%; background: rgba(0, 204, 255, 0.1);"></div>

    <div class="container">
        <h1>
            <span class="premium-text">chaaa enna la nammavey mudiyala enna avloo pudikkum ma loosee</span>
        </h1>
        <div class="emoji-showcase">
            <span class="emoji-item" onclick="teleport(this)">🤪</span>
            <span class="emoji-item" onclick="teleport(this)">❤️</span>
            <span class="emoji-item" onclick="teleport(this)">✨</span>
        </div>
        <p class="sub-text">You just made my day special! 🥰</p>
    </div>

    <script>
        // Infinity Confetti
        const end = Date.now() + (15 * 1000);
        const colors = ['#ff3366', '#ff00cc', '#ffffff', '#00ccff'];

        (function frame() {
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: colors
            });
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: colors
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());

        // Heart bursts
        setInterval(() => {
            confetti({
                particleCount: 40,
                scalar: 2,
                angle: 90,
                spread: 360,
                startVelocity: 30,
                origin: { x: Math.random(), y: Math.random() - 0.2 },
                shapes: ['circle'],
                colors: ['#ff3366', '#ff00cc']
            });
        }, 3000);

        function teleport(el) {
            const padding = 150;
            const x = Math.random() * (window.innerWidth - padding * 2) + padding;
            const y = Math.random() * (window.innerHeight - padding * 2) + padding;

            el.style.position = 'fixed';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.transform = 'scale(2) rotate(720deg)';
            el.style.zIndex = '1000';

            setTimeout(() => {
                el.style.transform = 'scale(1) rotate(0deg)';
            }, 600);
        }
    </script>
</body>

</html>
