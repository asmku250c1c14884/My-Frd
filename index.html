<!-- ONLY CHANGE IS INSIDE submitName() FUNCTION -->

<script>
function submitName(){
  const v=document.getElementById('nameIn').value.trim().toLowerCase();

  // ✅ Allow only "subha"
  if(v !== "subha"){
    const inp=document.getElementById('nameIn');
    inp.classList.add('shake');
    inp.style.borderColor='var(--rose)';
    inp.value="";
    inp.placeholder='Only Subha can enter 💔';

    setTimeout(()=>{
      inp.classList.remove('shake');
      inp.style.borderColor='';
      inp.placeholder='e.g. Enter Your Name , Arun…';
    },2200);

    return; // ❌ stop here
  }

  // ✅ Correct name → continue
  curName="Subha";

  document.getElementById('qName').textContent=curName;

  const nb=document.getElementById('noBtn');
  nb.style.left=(innerWidth/2+60)+'px';
  nb.style.top=(innerHeight*.65)+'px';

  showPage('pg3');
}
</script>
